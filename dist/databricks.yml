bundle:
  name: h3-turbo-benchmark

resources:
  jobs:
    benchmark_job:
      name: "H3 Turbo Benchmark (DBR 17)"

      # Define the cluster once at the job level
      job_clusters:
        - job_cluster_key: benchmark_cluster
          new_cluster:
            spark_version: "17.x-gpu-ml-scala2.12"
            node_type_id: "g4dn.xlarge"
            num_workers: 1
            spark_env_vars:
              H3_TURBO_LICENSE: "LICENSE-craig-20990101-70D4C3B8D0CE5772DA9B410F4589FDFE254EEA3DE15E7FD3F6F1AD4B97D8B12C"
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"

      tasks:
        - task_key: benchmark_task
          job_cluster_key: benchmark_cluster
          notebook_task:
            notebook_path: ./databricks_benchmark.ipynb
          libraries:
            - whl: ./h3_turbo-0.0.1-cp312-cp312-manylinux_2_39_x86_64.whl
